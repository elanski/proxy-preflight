# Speedtest конфигов из configs/available
name: Speedtest

on:
  workflow_run:
    workflows: ["Daily check"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

env:
  MAX_WORKERS: 700
  BASE_PORT: 20000
  XRAY_STARTUP_WAIT: 0.3
  XRAY_STARTUP_POLL_INTERVAL: 0.2
  SPEED_TEST_ENABLED: 'true'
  SPEED_TEST_TIMEOUT: 8
  SPEED_TEST_MODE: full
  SPEED_TEST_METRIC: latency
  SPEED_TEST_OUTPUT: separate_file
  SPEED_TEST_REQUESTS: 12
  SPEED_TEST_MIN_SUCCESS_RATIO: 0.6
  SPEED_TEST_MIN_SUCCESS_COUNT: 5
  SPEED_TEST_URL: https://www.gstatic.com/generate_204
  SPEED_TEST_WORKERS: 700
  SPEED_TEST_DOWNLOAD_TIMEOUT: 20
  SPEED_TEST_DOWNLOAD_URL_SMALL: https://speed.cloudflare.com/__down?bytes=250000
  SPEED_TEST_DOWNLOAD_URL_MEDIUM: https://speed.cloudflare.com/__down?bytes=1000000
  MIN_SPEED_THRESHOLD_MBPS: 2
  SPEED_TEST_DEBUG: 'false'
  OUTPUT_DIR: configs
  XRAY_PORT_WAIT: 8
  AUTO_COMMENT: ' verified · proxy-preflight'
  XRAY_PATH: xray_dist/xray

concurrency:
  group: proxy-preflight-serial
  cancel-in-progress: false

jobs:
  speedtest:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-
      - name: Install dependencies
        run: pip install -r requirements.txt -q
      - name: Get latest xray version
        id: xray_version
        run: |
          VER=$(curl -s -H "Authorization: token ${{ secrets.GH_PAT }}" \
            https://api.github.com/repos/XTLS/Xray-core/releases/latest \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['tag_name'])")
          echo "version=$VER" >> $GITHUB_OUTPUT
      - name: Cache xray binary
        id: cache_xray
        uses: actions/cache@v4
        with:
          path: xray_dist/xray
          key: xray-${{ steps.xray_version.outputs.version }}-linux-amd64
      - name: Install xray (if not cached)
        if: steps.cache_xray.outputs.cache-hit != 'true'
        run: |
          XRAY_URL=$(curl -s -H "Authorization: token ${{ secrets.GH_PAT }}" \
            https://api.github.com/repos/XTLS/Xray-core/releases/latest \
            | python3 -c "
import sys,json
assets = json.load(sys.stdin)['assets']
url = [a['browser_download_url'] for a in assets if a['name'] == 'Xray-linux-64.zip']
print(url[0] if url else '')
")
          mkdir -p xray_dist
          curl -sL "$XRAY_URL" -o xray.zip
          unzip -q xray.zip xray -d xray_dist/
          chmod +x xray_dist/xray
      - name: Run speedtest on configs/available
        if: hashFiles('configs/available') != ''
        env:
          XRAY_PATH: ${{ env.XRAY_PATH }}
          MAX_WORKERS: ${{ env.MAX_WORKERS }}
          BASE_PORT: ${{ env.BASE_PORT }}
          XRAY_STARTUP_WAIT: ${{ env.XRAY_STARTUP_WAIT }}
          XRAY_PORT_WAIT: ${{ env.XRAY_PORT_WAIT }}
          SPEED_TEST_ENABLED: ${{ env.SPEED_TEST_ENABLED }}
          SPEED_TEST_TIMEOUT: ${{ env.SPEED_TEST_TIMEOUT }}
          SPEED_TEST_MODE: ${{ env.SPEED_TEST_MODE }}
          SPEED_TEST_METRIC: ${{ env.SPEED_TEST_METRIC }}
          SPEED_TEST_OUTPUT: ${{ env.SPEED_TEST_OUTPUT }}
          SPEED_TEST_REQUESTS: ${{ env.SPEED_TEST_REQUESTS }}
          SPEED_TEST_MIN_SUCCESS_RATIO: ${{ env.SPEED_TEST_MIN_SUCCESS_RATIO }}
          SPEED_TEST_MIN_SUCCESS_COUNT: ${{ env.SPEED_TEST_MIN_SUCCESS_COUNT }}
          SPEED_TEST_URL: ${{ env.SPEED_TEST_URL }}
          SPEED_TEST_WORKERS: ${{ env.SPEED_TEST_WORKERS }}
          SPEED_TEST_DOWNLOAD_TIMEOUT: ${{ env.SPEED_TEST_DOWNLOAD_TIMEOUT }}
          SPEED_TEST_DOWNLOAD_URL_SMALL: ${{ env.SPEED_TEST_DOWNLOAD_URL_SMALL }}
          SPEED_TEST_DOWNLOAD_URL_MEDIUM: ${{ env.SPEED_TEST_DOWNLOAD_URL_MEDIUM }}
          MIN_SPEED_THRESHOLD_MBPS: ${{ env.MIN_SPEED_THRESHOLD_MBPS }}
          OUTPUT_DIR: configs
          OUTPUT_FILE: available_st
          MODE: single
        run: |
          echo "Running speedtest on $(wc -l < configs/available 2>/dev/null || echo 0) proxies..."
          python3 -m lib.speedtest_checker configs/available
      - name: Make top100 speedtest
        run: |
          if [ -f configs/available_st ]; then
            head -n 100 configs/available_st > "configs/available_st(top100)"
          fi
      - name: Add GeoIP comments
        run: |
          if [ -s configs/available_st ]; then
            STRIP_VPN_COMMENTS_FAST=1 AUTO_COMMENT="${{ env.AUTO_COMMENT }}" \
              python3 lib/strip_vpn_comments.py configs/available_st -o configs/available_st
          fi
      - name: Send Telegram notification
        if: secrets.TG_BOT_TOKEN != ''
        run: |
          if [ -f configs/available_st ]; then
            ST=$(wc -l < configs/available_st 2>/dev/null || echo 0)
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage" \
              -d "chat_id=${{ secrets.TG_CHAT_ID }}" \
              -d "text=✅ Speedtest completed: ${ST} proxies verified" || true
          fi
      - name: Commit speedtest results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add configs/available_st "configs/available_st(top100)" configs/available || true
          git diff --staged --quiet && echo "No changes" && exit 0
          ST=$(wc -l < configs/available_st 2>/dev/null || echo 0)
          git commit -m "chore: speedtest ${ST} proxies"
          git push --force-with-lease || git push --force
