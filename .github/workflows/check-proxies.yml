name: Proxy Preflight Check

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install aiohttp requests

      - name: Run TCP checker
        env:
          CHECK_TIMEOUT: "5"
          CHECK_CONCURRENCY: "300"
        run: python check_proxies.py

      - name: Send results to Telegram
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python send_results.py

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add proxies_live.txt
          git diff --staged --quiet || git commit -m "Update proxies $(date -u +'%Y-%m-%d %H:%M UTC') [skip ci]"
          git push