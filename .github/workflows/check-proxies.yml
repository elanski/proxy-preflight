name: Proxy Preflight Check (xray)

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 55

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install aiohttp requests rich

      - name: Download MK_XRAYchecker
        run: |
          curl -sL "https://raw.githubusercontent.com/MKultra6969/MK_XRAYchecker/main/v2rayChecker.py" > v2rayChecker.py
          curl -sL "https://raw.githubusercontent.com/MKultra6969/MK_XRAYchecker/main/requirements.txt" > requirements_mk.txt
          pip install -r requirements_mk.txt -q

      - name: Get latest xray version
        id: xray_version
        run: |
          VER=$(curl -s -H "Authorization: token ${{ secrets.GH_PAT }}" https://api.github.com/repos/XTLS/Xray-core/releases/latest | python3 -c "import sys,json; print(json.load(sys.stdin)['tag_name'])")
          echo "version=$VER" >> $GITHUB_OUTPUT
          echo "Xray latest: $VER"

      - name: Cache xray binary
        id: cache_xray
        uses: actions/cache@v4
        with:
          path: bin/xray
          key: xray-${{ steps.xray_version.outputs.version }}-linux-amd64

      - name: Install xray (if not cached)
        if: steps.cache_xray.outputs.cache-hit != 'true'
        run: |
          echo "Cache miss — downloading xray ${{ steps.xray_version.outputs.version }}..."
          XRAY_URL=$(curl -s -H "Authorization: token ${{ secrets.GH_PAT }}" https://api.github.com/repos/XTLS/Xray-core/releases/latest | python3 -c "
          import sys,json
          assets = json.load(sys.stdin)['assets']
          url = [a['browser_download_url'] for a in assets if a['name'] == 'Xray-linux-64.zip']
          print(url[0] if url else '')
          ")
          echo "Downloading: $XRAY_URL"
          mkdir -p bin
          curl -sL "$XRAY_URL" -o xray.zip
          unzip -q xray.zip xray -d bin/
          chmod +x bin/xray

      - name: Verify xray
        run: bin/xray version

      - name: Collect sources
        run: python check_proxies.py

      - name: Run xray checker
        run: |
          TOTAL=$(wc -l < input_proxies.txt)
          echo "Checking $TOTAL proxies with xray..."
          python v2rayChecker.py \
            -f input_proxies.txt \
            --no-update \
            --engine xray \
            -c bin/xray \
            -t 5 \
            -T 10 \
            -o proxies_live.txt \
            --max-ping 3000
        env:
          MKXRAY_SKIP_SELF_UPDATE: "1"

      - name: Prepare final output
        run: |
          python3 -c "
          import datetime
          now = datetime.datetime.utcnow().strftime('%Y-%m-%d %H:%M UTC')
          proxies = []
          try:
              with open('proxies_live.txt') as f:
                  proxies = [l.strip() for l in f if l.strip() and not l.startswith('#')]
          except FileNotFoundError:
              pass
          total_in = sum(1 for _ in open('input_proxies.txt'))
          with open('proxies_live.txt', 'w') as f:
              f.write(f'# Proxy preflight (xray) — {len(proxies)} live / {total_in} total\n')
              f.write(f'# Updated: {now}\n')
              for p in proxies:
                  f.write(p + '\n')
          print(f'Final: {len(proxies)} live / {total_in} total')
          "

      - name: Send results to Telegram
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python send_results.py

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add proxies_live.txt
          git diff --staged --quiet || git commit -m "Update proxies $(date -u +'%Y-%m-%d %H:%M UTC') [skip ci]"
          git push