name: Proxy Preflight Check (xray)

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 55

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install aiohttp requests rich

      - name: Download MK_XRAYchecker
        run: |
          curl -sL "https://raw.githubusercontent.com/MKultra6969/MK_XRAYchecker/main/v2rayChecker.py" > v2rayChecker.py
          curl -sL "https://raw.githubusercontent.com/MKultra6969/MK_XRAYchecker/main/requirements.txt" > requirements_mk.txt
          pip install -r requirements_mk.txt -q

      - name: Get latest xray version
        id: xray_version
        run: |
          VER=$(curl -s -H "Authorization: token ${{ secrets.GH_PAT }}" https://api.github.com/repos/XTLS/Xray-core/releases/latest | python3 -c "import sys,json; print(json.load(sys.stdin)['tag_name'])")
          echo "version=$VER" >> $GITHUB_OUTPUT
          echo "Xray latest: $VER"

      - name: Cache xray binary
        id: cache_xray
        uses: actions/cache@v4
        with:
          path: bin/xray
          key: xray-${{ steps.xray_version.outputs.version }}-linux-amd64

      - name: Install xray (if not cached)
        if: steps.cache_xray.outputs.cache-hit != 'true'
        run: |
          echo "Cache miss — downloading xray ${{ steps.xray_version.outputs.version }}..."
          XRAY_URL=$(curl -s -H "Authorization: token ${{ secrets.GH_PAT }}" https://api.github.com/repos/XTLS/Xray-core/releases/latest | python3 -c "
          import sys,json
          assets = json.load(sys.stdin)['assets']
          url = [a['browser_download_url'] for a in assets if a['name'] == 'Xray-linux-64.zip']
          print(url[0] if url else '')
          ")
          echo "Downloading: $XRAY_URL"
          mkdir -p bin
          curl -sL "$XRAY_URL" -o xray.zip
          unzip -q xray.zip xray -d bin/
          chmod +x bin/xray

      - name: Verify xray
        run: bin/xray version

      - name: Scrape Telegram channels
        env:
          TG_API_ID: ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
          TG_SESSION: ${{ secrets.TG_SESSION }}
        run: |
          python3 -c "
          import asyncio, os, re
          from telethon import TelegramClient
          from telethon.sessions import StringSession

          API_ID = int(os.environ['TG_API_ID'])
          API_HASH = os.environ['TG_API_HASH']
          SESSION = os.environ.get('TG_SESSION', '')
          SCHEME_RE = re.compile(r'(?:vless|vmess|trojan|ss|hysteria2|hy2|tuic)://[^\s<>\"\n]+', re.IGNORECASE)

          CHANNELS = [
              'VIPROXYS',
              'v2rayfreedaily',
              'vrayconfigs',
              'HomayounConfigs',
              'v2rayng_configsss',
              'V2ray_configs2',
              'oneclickvpnkeys',
              'V2RAYNG_VPNT',
              'v2rayfresh',
              'config_vless',
              'freeeirannet',
              'v2rayng_hub',
              'Vepeer_VPN',
              'nV_v2ray',
              'h110vpnchat',
              'sigma_smart_vpn',
              'OkeyVPNfree',
          ]

          def extract(msg):
              configs = set()
              if msg.text:
                  for m in SCHEME_RE.finditer(msg.text):
                      c = m.group(0).strip().rstrip('.,|)')
                      if len(c) > 20:
                          configs.add(c)
              return configs

          async def scrape():
              client = TelegramClient(StringSession(SESSION), API_ID, API_HASH)
              await client.start()
              os.makedirs('sources_tg', exist_ok=True)
              for channel in CHANNELS:
                  configs = set()
                  try:
                      async for msg in client.iter_messages(channel, limit=500):
                          configs |= extract(msg)
                      with open(f'sources_tg/{channel}.txt', 'w') as f:
                          f.write('\n'.join(sorted(configs)))
                      print(f'{channel}: {len(configs)} configs')
                  except Exception as e:
                      print(f'Error {channel}: {e}')
              await client.disconnect()

          asyncio.run(scrape())
          "

      - name: Collect sources
        run: |
          python check_proxies.py
          # Добавляем конфиги из TG каналов
          python3 -c "
          import glob, os
          seen = set()
          lines = []
          if os.path.exists('input_proxies.txt'):
              with open('input_proxies.txt') as f:
                  for l in f:
                      l = l.strip()
                      if l and l not in seen:
                          seen.add(l)
                          lines.append(l)
          SCHEMES = ('vless://','vmess://','trojan://','ss://','hysteria2://','hy2://','tuic://')
          for fname in glob.glob('sources_tg/*.txt'):
              with open(fname) as f:
                  for l in f:
                      l = l.strip()
                      if l and any(l.lower().startswith(s) for s in SCHEMES) and l not in seen:
                          seen.add(l)
                          lines.append(l)
          with open('input_proxies.txt', 'w') as f:
              f.write('\n'.join(lines))
          print(f'Total with TG sources: {len(lines)}')
          "

      - name: Run xray checker
        run: |
          TOTAL=$(wc -l < input_proxies.txt)
          echo "Checking $TOTAL proxies with xray..."
          python v2rayChecker.py \
            -f input_proxies.txt \
            --no-update \
            --engine xray \
            -c bin/xray \
            -t 5 \
            -T 10 \
            -o proxies_live.txt \
            --max-ping 3000
        env:
          MKXRAY_SKIP_SELF_UPDATE: "1"

      - name: Prepare final output
        run: |
          python3 -c "
          import datetime
          now = datetime.datetime.utcnow().strftime('%Y-%m-%d %H:%M UTC')
          proxies = []
          try:
              with open('proxies_live.txt') as f:
                  proxies = [l.strip() for l in f if l.strip() and not l.startswith('#')]
          except FileNotFoundError:
              pass
          total_in = sum(1 for _ in open('input_proxies.txt'))
          with open('proxies_live.txt', 'w') as f:
              f.write(f'# Proxy preflight (xray) — {len(proxies)} live / {total_in} total\n')
              f.write(f'# Updated: {now}\n')
              for p in proxies:
                  f.write(p + '\n')
          print(f'Final: {len(proxies)} live / {total_in} total')
          "

      - name: Send results to Telegram
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python send_results.py

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add proxies_live.txt
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "Update proxies $(date -u +'%Y-%m-%d %H:%M UTC') [skip ci]"
          git pull --rebase origin main
          git push